name        = "LoveClaude"
license     = "MIT"
licenselink = "https://github.com/iwsheng/loveclaude/blob/main/LICENSE"
description = "A Claude / Anthropic-inspired Hugo blog theme — dark-first, serif typography, glass morphism, floating TOC, and a life-tree homepage."
homepage    = "https://github.com/iwsheng/loveclaude"
demosite    = "https://iws.tw"
tags        = ["blog", "dark", "responsive", "multilingual", "toc", "search", "rss"]
min_version = "0.146.0"

[author]
  name    = "iWSheng"
  homepage = "https://iws.tw"

features = [
  "responsive",
  "dark-mode",
  "light-mode",
  "card-list",
  "pagination",
  "toc",
  "search",
  "rss",
  "life-tree-homepage",
  "floating-toc",
  "glass-morphism",
]
